services:
  mysql:
    image: mysql:8.4
    container_name: shoplane-mysql
    environment:
      MYSQL_DATABASE: ecomDB
      MYSQL_USER: shoplane_user
      MYSQL_PASSWORD: shoplane_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - shoplane-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: shoplane-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ecomDB
      DB_USER: shoplane_user
      DB_PASS: shoplane_password
      JWT_SECRET: your-development-secret-key-must-be-at-least-32-characters
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  shoplane-mysql: